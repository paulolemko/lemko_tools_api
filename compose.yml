services:
  asr:
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=3).read()\""]
      interval: 20s
      timeout: 5s
      retries: 5
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lemko-asr
    env_file:
      - .env
    environment:
      TRANSCRIPTIONS_CSV_PATH: /app/logs/transcriptions_log.csv
      TRANSCRIPTED_SOURCE_DIR: /app/logs/transcripted_source
      LEM_SEARCH_LOG_PATH: /app/logs/lemko_search_log.csv
      LEM_TRANSLATE_LOG_PATH: /app/logs/lemko_translate_log.csv
      LEM_TTS_LOG_PATH: /app/logs/lemko_tts_log.csv
      VOCAB_JSON_DIR: /app/vocab_json
      LEM_TRANSLATE_PROVIDER: codex
      LEM_SEARCH_LLM_PROVIDER: codex
      CODEX_CLI_PATH: /usr/local/bin/codex
      CODEX_AUTH_DIR: /run/codex-auth
      CODEX_CLI_TIMEOUT_SECONDS: "900"
      PL_LEM_TRANSLATE_API_BASE: http://127.0.0.1:8000
      PL_LEM_TRANSLATE_CODEX_BIN: /usr/local/bin/codex
      PL_LEM_TRANSLATE_RULES_DIR: /app/docs/structured_rules
      PL_LEM_TRANSLATE_CODEX_TIMEOUT_SECONDS: "900"
    ports:
      - "127.0.0.1:8000:8000"   # słucha tylko na hoście (loopback)
    volumes:
      - ./scripts:/app/scripts:ro
      - ./docs/structured_rules:/app/docs/structured_rules:ro
      - ./logs:/app/logs
      - ./models:/app/models:ro
      - ./vocab_json:/app/vocab_json:ro
      - ./morphology_structure_pl_lem_eng:/app/morphology_structure_pl_lem_eng:ro
      - /home/webserver/bin/codex:/usr/local/bin/codex:ro
      - /home/webserver/.codex/auth.json:/run/codex-auth/auth.json:ro
      - /home/webserver/.codex/config.toml:/run/codex-auth/config.toml:ro
    networks: [web]
  postgres:
    image: postgres:16
    container_name: lemslownik-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${LEMSLOWNIK_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./psql_dump:/dumps:ro
    ports:
      - "127.0.0.1:5432:5432"
    networks: [web]
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    environment:
      QDRANT__STORAGE__SNAPSHOTS__ENABLED: "true"
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
      - ./qdrant_snapshots:/qdrant/snapshots
    networks: [web]

  caddy:
    image: caddy:2.8
    container_name: caddy
    ports:
      - "8180:80"
      - "8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - asr
    networks: [web]

networks:
  web: {}

volumes:
  caddy_data: {}
  caddy_config: {}
  postgres_data: {}
  qdrant_data: {}
